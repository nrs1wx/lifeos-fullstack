services:
  - type: web
    name: lifeos-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install --include=dev && npm run db:push:prod && npm run build:prod
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: APP_NAME
        value: LifeOS
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
